# Autoskills Workflow Dependency Update

## Action

Follow the dependency-update workflow:
1. Update the version of a dependency in package.json
2. Regenerate or update pnpm-lock.yaml to reflect the new dependency version
3. Commit both files with a message indicating the dependency change

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: package.json, pnpm-lock.yaml

